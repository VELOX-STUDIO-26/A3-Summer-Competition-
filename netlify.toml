[build]
  base = "a3-system/frontend/web"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirects for API calls to backend (update URL when backend is deployed)
# [[redirects]]
#   from = "/api/*"
#   to = "https://your-backend-url.com/api/:splat"
#   status = 200
#   force = true

# NOTE: Do NOT add a SPA fallback redirect (/* -> /index.html) here.
# The @netlify/plugin-nextjs handles all routing for Next.js apps.
# A catch-all redirect would break SSR, dynamic routes, and API routes.
